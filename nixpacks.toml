[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd frontend && npm ci --include=dev"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "gunicorn 'src.app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"
